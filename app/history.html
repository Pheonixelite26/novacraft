<script>
(async () => {
  initLang();
  await initAuth(true);
  document.getElementById('navEmail').textContent = user.email;
  document.getElementById('sn-hist').classList.add('active');
  loadHist();
})();
function loadHist(){
  if(!user) return;
  const {data:all} = await db.from('listings').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  document.getElementById('histWrap').innerHTML = (all&&all.length)
    ? all.map(l=>listingRow(l,true)).join('')
    : `<div class="empty-box"><div class="empty-icon">📋</div><p>${t('emptyHist')}</p><button class="btn-xl accent" style="font-size:13px;padding:10px 24px" onclick="goPage('gen')">${t('newListingBtn')}</button></div>`;
}

function listingRow(l, showDel){
  const date = new Date(l.created_at).toLocaleDateString('ro-RO');
  const n = l.sections ? Object.keys(l.sections).length : 0;
  return `<div class="listing-row">
    <div>
      <div class="lr-name">${esc(l.product_name)}</div>
      <div class="lr-meta">${(l.platform||'').toUpperCase()} · ${l.language} · ${n} sectiuni · ${date}</div>
    </div>
    <div class="lr-actions">
      <button class="ic-btn" onclick="openListing('${l.id}')">${t('openBtn')}</button>
      ${showDel?`<button class="ic-btn red" onclick="delListing('${l.id}')">${t('deleteBtn')}</button>`:''}
    </div>
  </div>`;
}

async function delListing(id){
  if(!confirm(t('confirmDelete'))) return;
  await db.from('listings').delete().eq('id',id);
  loadHist(); toast(t('listingDeleted'),'ok');
}

async function openListing(id){
  const {data:l} = await db.from('listings').select('*').eq('id',id).single();
  if(!l) return;
  goPage('gen');
  document.getElementById('gName').value = l.product_name;
  document.getElementById('gLang').value = l.language||'romana';
  if(l.sections){
    sections = Object.values(l.sections);
    listingName = l.product_name;
    renderSections(sections, l.platform||'emag');
    document.getElementById('genOutput').style.display='block';
  }
}
